<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Performance Predictor | ML Project</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>📚 Student Performance Predictor</h1>

        <p class="subtitle">
            Predict a student's final marks using Machine Learning
        </p>

        <form action="/predict" method="POST">

            <!-- Study Hours -->

            <label for="study_hours">Study Hours</label>

            <input
                type="number"
                id="study_hours"
                name="study_hours"
                min="0"
                max="24"
                step="0.1"
                placeholder="Enter study hours"
                required>

            <!-- Attendance -->

            <label for="attendance">Attendance (%)</label>

            <input
                type="number"
                id="attendance"
                name="attendance"
                min="0"
                max="100"
                placeholder="Enter attendance percentage"
                required>

            <!-- Previous Marks -->

            <label for="previous_marks">Previous Marks</label>

            <input
                type="number"
                id="previous_marks"
                name="previous_marks"
                min="0"
                max="100"
                placeholder="Enter previous marks"
                required>

            <!-- Assignments -->

            <label for="assignments">Assignments Completed</label>

            <input
                type="number"
                id="assignments"
                name="assignments"
                min="0"
                max="10"
                placeholder="Enter completed assignments"
                required>

            <!-- Sleep Hours -->

            <label for="sleep_hours">Sleep Hours</label>

            <input
                type="number"
                id="sleep_hours"
                name="sleep_hours"
                min="0"
                max="24"
                step="0.1"
                placeholder="Enter sleep hours"
                required>

            <!-- Buttons -->

            <div class="button-group">

                <button type="submit" class="predict-btn">
                    🚀 Predict Marks
                </button>

                <a href="/" class="reset-btn"> 🔄 Reset </a>

            </div>

        </form>

        <!-- Prediction -->

        {% if prediction %}

        <div class="result">

            <h2>🎯 Predicted Marks</h2>

            <p>{{ prediction }}</p>

        </div>

        {% endif %}

        <!-- Footer -->

        <footer>

            Made with using Flask & Machine Learning

            <br><br>

            Developed by <strong>Vishal Thakur</strong>

        </footer>

    </div>

</body>

</html>
